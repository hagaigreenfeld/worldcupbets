name: 🗂 Backfill All Bets

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print what would be written, no changes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  SPORT5_EMAIL:           ${{ secrets.SPORT5_EMAIL }}
  SPORT5_PASSWORD:        ${{ secrets.SPORT5_PASSWORD }}
  GOOGLE_SHEETS_KEY_JSON: ${{ secrets.GOOGLE_SHEETS_KEY_JSON }}
  GOOGLE_SHEET_ID:        ${{ secrets.GOOGLE_SHEET_ID }}

jobs:
  backfill:
    name: Backfill All Bets tab
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        working-directory: worldcup_bets
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python3 scripts/backfill_all_bets.py $DRY_FLAG
