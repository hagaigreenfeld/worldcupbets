name               = "sport5-whatsapp-bot"
main               = "worker.js"
compatibility_date = "2024-01-01"

# ── Plain vars (non-sensitive, baked in at deploy time) ────────────────────────
[vars]
GITHUB_REPO = "hagaigreenfeld/worldcupbets"
TWILIO_FROM = "whatsapp:+14155238886"

# ── Secrets (set ONCE in Cloudflare dashboard → Workers → your worker → Settings → Variables → add as Secret)
# Secrets are encrypted and persist across deploys — you never need to re-enter them:
#
#   TWILIO_ACCOUNT_SID   your Twilio account SID
#   TWILIO_AUTH_TOKEN    your Twilio auth token
#   WHATSAPP_GROUP_ID    whatsapp:+972XXXXXXXXX
#   SPORT5_EMAIL         hagaigreenfeld@gmail.com
#   SPORT5_PASSWORD      your Sport5 password
#   PUSH_SECRET          any random string
#   GITHUB_TOKEN         GitHub PAT with workflow scope
